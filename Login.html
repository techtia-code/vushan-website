<!DOCTYPE html>
<html lang="en">
<head>
  <title>VUSHĀN — Admin Login</title>
  <link rel="stylesheet" href="admin.css">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
</head>
<body class="login-body">

  <div style="text-align:center; margin-bottom:28px;">
    <div class="login-logo">VUSH<span>Ā</span>N</div>
    <div style="font-size:10px;letter-spacing:4px;text-transform:uppercase;color:var(--gold);">Admin Portal</div>
  </div>

  <div class="login-box">
    <h2>Sign In</h2>
    <p class="login-sub">Restricted access. Authorised personnel only.</p>
    <form id="loginForm">
      <input type="text" id="username" placeholder="Username" required>
      <input type="password" id="password" placeholder="Password" required>
      <button type="submit">Sign In to Dashboard</button>
    </form>
    <p style="text-align:center;margin-top:20px;font-size:12px;">
      <a href="../webindex/index.html" style="color:var(--text-muted);transition:color .2s;" onmouseover="this.style.color='var(--gold)'" onmouseout="this.style.color='var(--text-muted)'">
        &larr; Back to Website
      </a>
    </p>
  </div>

  <p style="text-align:center;font-size:11px;color:rgba(255,255,255,0.2);margin-top:28px;letter-spacing:1px;">
    &copy; 2026 VUSHĀN — Powered by TECHTIA ENT.
  </p>

<script src="admin.js"></script>
</body>
</html>
